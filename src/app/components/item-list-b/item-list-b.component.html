<div>
  <h2>Lista obiektów B</h2>
   <p>Liczba ukryć formularza: {{ counterService.getCount() }}</p>
  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Nazwa</th>
        <th>Wartość</th>
        <th>Data</th>
        <th>Akcja</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let item of items">
        <td>{{ item.id }}</td>
        <td>{{ item.name }}</td>
        <td>{{ item.value }}</td>
        <td>{{ item.date | date:'yyyy-MM-dd' }}</td>
        <td><button (click)="deleteItem(item.id)">Usuń</button></td>
      </tr>
    </tbody>
  </table>
</div>
<button (click)="toggleForm()">
  {{ showForm ? 'Ukryj formularz' : 'Dodaj nowy obiekt' }}
</button>
<taiib2-item-form
  *ngIf="showForm"
  (itemAdded)="onItemAdded()">
</taiib2-item-form>
